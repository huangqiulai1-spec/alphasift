<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720" role="img" aria-labelledby="title desc">
  <title id="title">AlphaSift quickstart terminal screenshot</title>
  <desc id="desc">A terminal screenshot showing AlphaSift quickstart selecting top dual-low candidates without an API key.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#141b2d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1100" height="720" fill="#eef2f8"/>
  <rect x="70" y="58" width="960" height="604" rx="24" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="70" y="58" width="960" height="54" rx="24" fill="#1f2937"/>
  <circle cx="103" cy="85" r="8" fill="#ff5f57"/>
  <circle cx="130" cy="85" r="8" fill="#ffbd2e"/>
  <circle cx="157" cy="85" r="8" fill="#28c840"/>
  <text x="550" y="91" fill="#cbd5e1" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui" font-size="15">alphasift quickstart</text>
  <g font-family="SFMono-Regular, Consolas, 'Liberation Mono', monospace" font-size="20" fill="#e5e7eb">
    <text x="104" y="152" fill="#93c5fd">$ alphasift quickstart</text>
    <text x="104" y="194" fill="#f8fafc">============================================================</text>
    <text x="104" y="226" fill="#fbbf24">AlphaSift Quickstart  ·  No API key demo</text>
    <text x="104" y="258" fill="#f8fafc">============================================================</text>
    <text x="104" y="312" fill="#a7f3d0">[1/3] Built-in strategies (8)</text>
    <text x="138" y="346">balanced_alpha      Balanced multi-factor</text>
    <text x="138" y="378" fill="#fbbf24">→ dual_low           Low PE + low PB value screen</text>
    <text x="138" y="410">volume_breakout     Volume breakout trend screen</text>
    <text x="104" y="464" fill="#a7f3d0">[2/3] Run dual_low (--no-llm, --no-post-analysis, top 5)</text>
    <text x="138" y="498">Universe 5196 → filtered 377 → output 5 (source: em_datacenter)</text>
    <text x="104" y="552" fill="#a7f3d0">[3/3] Candidate ranking</text>
    <text x="138" y="586" fill="#cbd5e1">rank  code    name         score   price   pe    pb</text>
    <text x="138" y="620" fill="#f8fafc">1     601668  China State  87.2    4.77    5.2   0.40</text>
    <text x="138" y="654" fill="#f8fafc">2     601818  Everbright   86.5    3.23    5.0   0.38</text>
  </g>
</svg>
