<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="330" viewBox="0 0 1100 330" role="img" aria-labelledby="title desc">
  <title id="title">AlphaSift pytest run screenshot</title>
  <desc id="desc">Terminal screenshot generated from a real pytest run: 176 passed, 1 skipped in 1.56s</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#141b2d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1100" height="330" fill="#eef2f8"/>
  <rect x="70" y="58" width="960" height="220" rx="24" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="70" y="58" width="960" height="54" rx="24" fill="#1f2937"/>
  <circle cx="103" cy="85" r="8" fill="#ff5f57"/>
  <circle cx="130" cy="85" r="8" fill="#ffbd2e"/>
  <circle cx="157" cy="85" r="8" fill="#28c840"/>
  <text x="550" y="91" fill="#cbd5e1" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui" font-size="15">real test run</text>
  <g font-family="SFMono-Regular, Consolas, 'Liberation Mono', monospace" font-size="20" fill="#e5e7eb">
    <text x="104" y="150" fill="#93c5fd">$ python -m pytest -q</text>
    <text x="104" y="184" fill="#e5e7eb">........................................................................ [ 40%]</text>
    <text x="104" y="218" fill="#e5e7eb">........................................................................ [ 81%]</text>
    <text x="104" y="252" fill="#e5e7eb">................................s                                        [100%]</text>
    <text x="104" y="286" fill="#a7f3d0">176 passed, 1 skipped in 1.56s</text>
  </g>
</svg>
